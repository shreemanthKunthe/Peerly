version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: peerly_postgres
    environment:
      POSTGRES_USER: peerly_user
      POSTGRES_PASSWORD: peerly_password
      POSTGRES_DB: peerly_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U peerly_user -d peerly_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
