syntax = "proto3";

package auth;

option go_package = "peerly.dev/backend/auth/proto;authpb";

service AuthService {
  // Verify a Firebase ID Token for Google Sign-In
  rpc VerifyFirebaseToken(VerifyFirebaseTokenRequest) returns (AuthResponse);
  
  // Native Email/Password Sign-Up
  rpc RegisterUser(RegisterUserRequest) returns (AuthResponse);
  
  // Native Email/Password Login
  rpc LoginUser(LoginUserRequest) returns (AuthResponse);
  
  // Refresh an expired Access Token using the HttpOnly cookie's Refresh Token
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);
  
  // Log out a user by revoking their refresh token
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  
  // For internal mTLS token verification (though Gateway mostly does this via JWKS, 
  // sometimes services need to look up active roles explicitly)
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);

  // Update the role for an authenticated user
  rpc SetRole(SetRoleRequest) returns (SetRoleResponse);
}

message VerifyFirebaseTokenRequest {
  string id_token = 1;
}

message RegisterUserRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
}

message LoginUserRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message AuthResponse {
  string access_token = 1;      // Short-lived JWT
  string refresh_token = 2;     // Long-lived Opaque token
  int64 expires_in = 3;         // Access token expiry in seconds
  string user_id = 4;
}

message LogoutResponse {
  bool success = 1;
}

message SetRoleRequest {
  string user_id = 1;
  string role = 2; // "SEEKER" or "GUIDER"
}

message SetRoleResponse {
  bool success = 1;
}

message VerifyTokenRequest {
  string access_token = 1;
}

message VerifyTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string role = 3;
}
